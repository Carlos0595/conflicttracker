spring:
  datasource:
    url: ${url}
    username: ${user}
    password: ${password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true   # ⭐ CLAVE PARA QUE FUNCIONE

  sql:
    init:
      mode: always
      continue-on-error: true
